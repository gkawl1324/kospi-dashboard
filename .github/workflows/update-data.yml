name: Update Financial Data

on:
  schedule:
    # Runs every 30 minutes during KRX market hours (9:30 AM ~ 3:30 PM KST, Mon-Fri)
    - cron: '30 0-6 * * 1-5'  # :30 of each hour (0:30~6:30 UTC = 9:30~15:30 KST)
    - cron: '0 1-6 * * 1-5'   # :00 of each hour (1:00~6:00 UTC = 10:00~15:00 KST)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Fetch financial data from Naver Finance
        run: python scripts/fetch_data.py

      - name: Commit and push data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet || git commit -m "Update financial data $(date -u +'%Y-%m-%d %H:%M')"
          git push
